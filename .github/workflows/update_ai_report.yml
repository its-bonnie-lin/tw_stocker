name: AI Quant Trading Report v7.0

on:
  schedule:
    # 每週一到五 UTC 09:00 執行（台灣時間 17:00 收盤後）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      tp_atr:
        description: 'ATR 停利倍數'
        required: false
        default: '4.0'
      sl_atr:
        description: 'ATR 停損倍數'
        required: false
        default: '3.0'
      hold_days:
        description: '最大持倉天數'
        required: false
        default: '20'
      top_k:
        description: '每日最多進場股票數'
        required: false
        default: '5'
      days:
        description: '回測天數'
        required: false
        default: '1200'
      gap_filter:
        description: '跳空過濾 ATR 倍數'
        required: false
        default: '1.5'

# 防止多個 run 同時 push 造成 race condition
concurrency:
  group: ai-report-main
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 完整 history，避免 rebase 問題

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Quant Pipeline v7.0
        run: |
          python ai_report.py \
            --regime-filter \
            --tp-atr ${{ github.event.inputs.tp_atr || '4.0' }} \
            --sl-atr ${{ github.event.inputs.sl_atr || '3.0' }} \
            --hold-days ${{ github.event.inputs.hold_days || '20' }} \
            --top-k ${{ github.event.inputs.top_k || '5' }} \
            --gap-filter ${{ github.event.inputs.gap_filter || '1.5' }} \
            --days ${{ github.event.inputs.days || '1200' }}

      - name: Cleanup old artifacts (keep last 180 days)
        run: |
          if [ -d "artifacts" ]; then
            find artifacts/ -type f -mtime +180 -delete 2>/dev/null || true
          fi

      - name: Commit and push
        run: |
          git config --global user.email "voidful.stack@gmail.com"
          git config --global user.name "Voidful"

          # Rebase onto latest remote to prevent non-fast-forward rejection
          git fetch origin main
          git rebase origin/main

          git add -A
          git commit -m "📊 AI Report v7.0 ($(date -u '+%Y-%m-%d'))" || echo "No changes"
          git push origin HEAD:main

  # 每季第一週自動跑 sweep + Monte Carlo + Walk-Forward
  quarterly-health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Check if quarterly (first week of Jan/Apr/Jul/Oct)
        id: check
        run: |
          DAY=$(date -u '+%d')
          MONTH=$(date -u '+%m')
          if [ "$DAY" -le 7 ] && ([ "$MONTH" = "01" ] || [ "$MONTH" = "04" ] || [ "$MONTH" = "07" ] || [ "$MONTH" = "10" ]); then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Quick Sweep
        if: steps.check.outputs.run == 'true'
        run: python sweep.py --quick --output csv

      - name: Walk-Forward Validation
        if: steps.check.outputs.run == 'true'
        run: python walk_forward.py

      - name: Monte Carlo Stress Test (Block Bootstrap)
        if: steps.check.outputs.run == 'true'
        run: python monte_carlo.py --runs 2000 --block-size 5

      - name: Upload quarterly report
        if: steps.check.outputs.run == 'true'
        run: |
          git config --global user.email "voidful.stack@gmail.com"
          git config --global user.name "Voidful"

          # Rebase onto latest remote to prevent non-fast-forward rejection
          git fetch origin main
          git rebase origin/main

          git add -A
          git commit -m "🔄 Quarterly health check ($(date -u '+%Y-%m-%d'))" || echo "No changes"
          git push origin HEAD:main
